              schema:
                $ref: '#/components/schemas/ProfileSectionListResponse'

  /api/profile/employment/add:
    post:
      tags: [Profile API]
      summary: Create employment record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [employer, job_title]
              properties:
                employer: { type: string }
                job_title: { type: string }
                location: { type: string, nullable: true }
                started_on: { type: string, format: date, nullable: true }
                ended_on: { type: string, format: date, nullable: true }
                is_current: { type: integer, enum: [0, 1] }
                description: { type: string, nullable: true }
      responses:
