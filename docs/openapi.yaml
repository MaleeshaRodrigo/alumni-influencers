      tags: [Profile API]
      summary: Create degree record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [institution, qualification]
              properties:
                institution: { type: string }
                qualification: { type: string }
                field_of_study: { type: string, nullable: true }
                grade_or_classification: { type: string, nullable: true }
                started_on: { type: string, format: date, nullable: true }
                completed_on: { type: string, format: date, nullable: true }
      responses:
        '201':
          description: Degree created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSectionItemResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileValidationError'

  /api/profile/degrees/update/{id}:
    post:
      tags: [Profile API]
      summary: Update degree record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [institution, qualification]
              properties:
                institution: { type: string }
                qualification: { type: string }
                field_of_study: { type: string, nullable: true }
                grade_or_classification: { type: string, nullable: true }
                started_on: { type: string, format: date, nullable: true }
                completed_on: { type: string, format: date, nullable: true }
      responses:
        '200':
          description: Degree updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSectionItemResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileValidationError'
        '404':
          description: Degree record not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/profile/degrees/delete/{id}:
    post:
      tags: [Profile API]
      summary: Delete degree record
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Degree deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileDeleteResponse'
        '404':
          description: Degree record not found
          content:
