openapi: 3.0.3
info:
  title: Alumni Influencers API
  version: 1.0.0
  description: >
    API and web action documentation for the CodeIgniter 3 Alumni Influencers project.
servers:
  - url: http://localhost/alumni-influencers
    description: Local XAMPP default
tags:
  - name: Health
  - name: Public API
  - name: Profile API
  - name: Authentication
  - name: Bidding
  - name: Admin API Keys
paths:
  /ping:
    get:
      tags: [Health]
      summary: Health check endpoint
      responses:
        '200':
          description: Service is reachable
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/featured-today:
    get:
      tags: [Public API]
      summary: Get today's featured alumnus (public, AR-facing)
      description: Returns safe public profile data only.
      responses:
        '200':
          description: Featured alumnus found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturedTodaySuccess'
        '404':
          description: No featured alumnus for current day
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeaturedTodayNotFound'
        '429':
          description: Public API rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/profile:
    get:
      tags: [Profile API]
      summary: Get current authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSingleResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Token scope or owner account state is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/profile/basic:
    get:
      tags: [Profile API]
      summary: Get basic profile payload for authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Basic profile fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSingleResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Token scope or owner account state is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /api/profile/save-basic:
    post:
      tags: [Profile API]
      summary: Create or update basic profile for authenticated user
      description: Accepts multipart form-data to support optional profile image upload.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [display_name]
              properties:
                display_name:
                  type: string
                bio:
                  type: string
                linkedin_url:
                  type: string
                  nullable: true
                is_public:
                  type: string
                  enum: ['0', '1', 'true', 'false']
                profile_image:
                  type: string
                  format: binary
      responses:
        '200':
          description: Basic profile saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSingleResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileValidationError'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '403':
          description: Token scope or owner account state is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '405':
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

