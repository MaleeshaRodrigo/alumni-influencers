      tags: [Profile API]
      summary: List degree records
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Degree list returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileSectionListResponse'
        '404':
          description: Basic profile not found for token owner
          content:
            application/json:
              schema:
